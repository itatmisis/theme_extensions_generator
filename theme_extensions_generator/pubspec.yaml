name: theme_extensions_generator
description: Generates ThemeExtension classes, mixins, lerp/tween logic and ThemeData accessors for Flutter themes
version: 1.2.4
repository: https://github.com/MiiMan/theme_extensions_generator

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  build: '>=3.0.0 <4.0.0'
  analyzer: '>=7.4.0 <9.0.0'
  source_gen: '>=3.0.0 <4.0.0'
  theme_extensions_annotation: '>=1.2.0 <2.0.0'

dev_dependencies:
  build_test: '>=3.3.3 <3.4.0'
  build_runner: '>=2.7.1 <2.8.0'
  lints: '>=5.1.1 <6.0.0'
  test: '>=1.26.3 <2.0.0'
  source_gen_test: '>=1.3.2 <2.0.0'
  flutter:
    sdk: flutter